version: "3.9"

services:
  api:
    build: .

    ports:
      - "3000:3000"

    depends_on:
      - postgres
      - redis

  worker:
    build: .

    command: npm run worker

    depends_on:
      - redis

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airdrop

    ports:
      - "5432:5432"